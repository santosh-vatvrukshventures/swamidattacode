<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Swamidatta Traders — Complete offline-first shop management PWA. POS billing, inventory tracking, expense logging, outstanding credit ledgers and financial reports." />
    
    <!-- PWA Settings -->
    <title>Swamidatta Traders Shop Manager</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f0502" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Swamidatta" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Preconnect & Preload Typography (Space Grotesk & Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body class="h-full bg-slate-900 text-slate-100 overflow-x-hidden select-none">
    <div id="root" class="h-full"></div>
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0f0502;color:#fff;font-family:system-ui;text-align:center;padding:2rem">
        <div>
          <h1 style="font-size:1.5rem;margin-bottom:0.5rem">Swamidatta Traders</h1>
          <p style="color:#b09c97">Please enable JavaScript to use this application.</p>
        </div>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registration with Update Detection -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('Service Worker registered:', reg.scope);

              // Check for updates periodically (every 60 seconds)
              setInterval(() => { reg.update(); }, 60000);

              // Detect new service worker waiting
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      // New version available — dispatch custom event for React to handle
                      window.dispatchEvent(new CustomEvent('sw-update-available', { detail: { registration: reg } }));
                    }
                  });
                }
              });
            })
            .catch((err) => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
